server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs   # Configs stored inside JAR
  profiles:
    active: native

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
